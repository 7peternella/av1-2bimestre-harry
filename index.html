<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogadores do Barcelona FC - AV1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <header class="text-center mb-4">
            <h1>Jogadores do Barcelona FC</h1>
            <p class="lead">Conheça os craques do time blaugrana</p>
        </header>
        <div class="row mb-4">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control" placeholder="Buscar jogador por nome...">
            </div>
            <div class="col-md-6">
                <select id="sortSelect" class="form-select">
                    <option value="name">Ordenar por Nome</option>
                    <option value="position">Ordenar por Posição</option>
                    <option value="nationality">Ordenar por Nacionalidade</option>
                </select>
            </div>
        </div>
        <div id="loading" class="text-center d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="mt-2">Buscando dados da API...</p>
        </div>
        <div id="error" class="alert alert-danger d-none text-center" role="alert">
            Ops! Não conseguimos carregar os dados. Verifique sua conexão e tente recarregar a página.
        </div>
        <div id="content" class="row d-none"></div>
    </div>

    <!-- Modal para detalhes do jogador -->
    <div class="modal fade" id="playerModal" tabindex="-1" aria-labelledby="playerModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="playerModalLabel">Detalhes do Jogador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="playerModalBody">
                    <!-- Conteúdo será preenchido via JS -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-5 py-3 bg-light">
        <p class="mb-0">Projeto AV1 - 2º Bimestre | Visca el Barça! ⚽</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
